<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forms &amp; Procedures | Point Folly Co.</title>

  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
  <div id="site-header"></div>

  <main class="archive-page">
    <h1>Forms &amp; Procedures</h1>
    <div class="dept">Field Materials</div>

    <div class="notice">
      <p>Standardized materials intended to support field operations, observation, annotation, and public participation.</p>
      <p>Documents are being prepared for release.</p>
    </div>

    <input id="archive-search" type="search" placeholder="Search documents...">

    <select id="archive-type-filter">
      <option value="">All Materials</option>
      <option value="form">Forms</option>
      <option value="procedure">Procedures</option>
    </select>

    <select id="archive-division-filter">
      <option value="">All Divisions</option>
      <option value="OHSD">OHSD</option>
      <option value="LED">LED</option>
      <option value="SRD">SRD</option>
    </select>

    <select id="archive-unit-filter">
      <option value="">All Units</option>
    </select>

    <select id="archive-sort">
        <option value="code-az">Code A-Z</option>
        <option value="code-za">Code Z-A</option>
        <option value="title-az">Title A-Z</option>
        <option value="title-za">Title Z-A</option>
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
    </div>

    <div id="archive-viewer" data-archive="forms-procedures"></div>

    <div class="code">PFC/DAP/FORMS-0</div>

    <img src="/assets/images/pfc_logo.png" alt="Point Folly Co. Emblem" class="logo">
  </main>

  <script src="/assets/js/script.js"></script>
  <script src="/assets/js/archive.js"></script>
</body>
</html>
