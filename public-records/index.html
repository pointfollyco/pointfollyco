<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Records | Point Folly Co.</title>

  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
  <div id="site-header"></div>

  <main class="archive-page">
    <h1>Public Records</h1>
    <div class="dept">Released Materials</div>

    <div class="notice">
      <p>Public notices, reports, publications, and related materials released by Point Folly Co.</p>
      <p>No public records are currently available.</p>
    </div>

    <input id="archive-search" type="search" placeholder="Search records...">

    <select id="archive-origin-filter">
      <option value="">All Records</option>
      <option value="pfc">Point Folly Co.</option>
      <option value="civilian">Civilian Submitted</option>
    </select>

    <select id="archive-division-filter">
      <option value="">All Divisions</option>
      <option value="OHSD">OHSD</option>
      <option value="LED">LED</option>
      <option value="SRD">SRD</option>
    </select>

    <select id="archive-unit-filter">
      <option value="">All Units</option>
    </select>

    <select id="archive-sort">
        <option value="code-az">Code A-Z</option>
        <option value="code-za">Code Z-A</option>
        <option value="title-az">Title A-Z</option>
        <option value="title-za">Title Z-A</option>
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
    </div>

    <div id="archive-viewer" data-archive="public-records"></div>

    <div class="code">PFC/DAP/RECORDS-0</div>

    <img src="/assets/images/pfc_logo.png" alt="Point Folly Co. Emblem" class="logo">
  </main>

  <script src="/assets/js/script.js"></script>
  <script src="/assets/js/archive.js"></script>
</body>
</html>
